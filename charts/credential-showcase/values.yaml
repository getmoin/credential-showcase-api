nameOverride: ""
fullnameOverride: ""

#ingressSuffix: -dev.apps.silver.devops.gov.bc.ca

api_server:
  name: credential-showcase-api-server
  image:
    repository: public.ecr.aws/k8o4d9r5/bcshowcase/credential-showcase-api-server
    pullPolicy: IfNotPresent
    pullSecrets: []
    tag: ""
  replicaCount: 1
  labelOverride: ""
  port: 3000
  path: /
  env:
    APP_NAME: credential-showcase-api
    LOG_LEVEL: debug
    DB_HOST: credential-showcase-postgresql
    DB_PORT: "5432"
    DB_NAME: showcase-db
    DB_USERNAME: showcase-user
    CORS_DISABLED: false
    ALLOW_ORIGINS: "*"
    ALLOW_METHODS: "GET, POST, PUT, DELETE, OPTIONS"
    ALLOW_HEADERS: "Content-Type, Authorization"
    ALLOW_CREDENTIALS: "true"
  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi
  podAnnotations: {}
  podSecurityContext: {}
  containerSecurityContext: {}
  service:
    type: ClusterIP
    port: 3000
  affinity: {}
  nodeSelector: {}
  tolerations: []
  networkPolicy:
    enabled: false
    ingress:
      enabled: false
      namespaceSelector: {}
      podSelector: {}
  openshift:
    route:
      enabled: false
      path: "/"
      targetPort: http
      tls:
        enabled: true
        termination: edge
  enabled: true
  serviceAccount:
    create: false
    name: ""
    annotations: {}
    automountServiceAccountToken: true
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 80
    targetMemoryUtilizationPercentage: 80
    stabilizationWindowSeconds: 300
  ingress:
    enabled: true
    annotations:
      kubernetes.io/ingress.class: "traefik"
      traefik.ingress.kubernetes.io/router.entrypoints: "websecure"
      traefik.ingress.kubernetes.io/router.tls: "true"
    host: "bcshowcase-api.dev.nborbit.ca"

traction_adapter:
  name: credential-showcase-traction-adapter
  image:
    repository: public.ecr.aws/k8o4d9r5/bcshowcase/credential-showcase-traction-adapter
    pullPolicy: IfNotPresent
    pullSecrets: []
    tag: ""
  replicaCount: 1
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 80
    targetMemoryUtilizationPercentage: 80
    stabilizationWindowSeconds: 300
  labelOverride: ""
  port: 3757
  path: /traction
  env:
    APP_NAME: credential-showcase-traction-adapter
    LOG_LEVEL: debug
    NODE_PORT: 3757
    RABBITMQ_HOST: rabbitmq
    RABBITMQ_PORT: 5672
    RABBITMQ_USER: guest
    RABBITMQ_VHOST: /
  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi
  podAnnotations: {}
  podSecurityContext: {}
  containerSecurityContext: {}
  service:
    type: ClusterIP
    port: 3757
  affinity: {}
  nodeSelector: {}
  tolerations: []
  networkPolicy:
    enabled: false
    ingress:
      enabled: false
      namespaceSelector: {}
      podSelector: {}
  openshift:
    route:
      enabled: false
      path: "/"
      targetPort: http
      tls:
        enabled: true
        termination: edge
  enabled: true
  serviceAccount:
    create: false
    annotations: {}
    automountServiceAccountToken: true
    name: ""
  ingress:
    enabled: true
    annotations:
      kubernetes.io/ingress.class: "traefik"
      traefik.ingress.kubernetes.io/router.entrypoints: "websecure"
      traefik.ingress.kubernetes.io/router.tls: "true"
    host: "bcshowcase-traction.dev.nborbit.ca"

# Global ingress settings
ingress:
  enabled: true
  className: "traefik"
  annotations:
    kubernetes.io/ingress.class: "traefik"
    traefik.ingress.kubernetes.io/router.entrypoints: "websecure"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  hosts:
    - host: api.showcase.example.com
      paths:
        - path: /
          pathType: Prefix
          service: api-server
    - host: traction.showcase.example.com
      paths:
        - path: /
          pathType: Prefix
          service: traction-adapter
  tls:
    - secretName: showcase-tls
      hosts:
        - api.showcase.example.com
        - traction.showcase.example.com

postgresql:
  enabled: true
  auth:
    username: "showcase-user"
    database: "showcase-db"
    existingSecret: ""
  primary:
    service:
      ports:
        postgresql: 5432
    persistence:
      enabled: true
      size: 1Gi
    resources:
      limits:
        cpu: 200m
        memory: 256Mi
      requests:
        cpu: 100m
        memory: 128Mi

rabbitmq:
  enabled: true
  auth:
    username: "guest"
    existingSecret: ""
  persistence:
    enabled: true
    size: 1Gi
  service:
    type: ClusterIP
    port: 5672
    managerPort: 15672
  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi
  containerSecurityContext:
    enabled: false
  podSecurityContext:
    enabled: false
  # metrics:
  #   enabled: false
  # plugins: "rabbitmq_management rabbitmq_prometheus"
  # extraPlugins: ""
  # clustering:
  #   enabled: false
  replicaCount: 1

global:
  namespaceOverride: ""