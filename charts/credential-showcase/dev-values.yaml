nameOverride: ""
fullnameOverride: ""

api_server:
  name: credential-showcase-api-server
  image:
    repository: public.ecr.aws/k8o4d9r5/bcshowcase/credential-showcase-api-server
    pullPolicy: IfNotPresent
    pullSecrets: []
    tag: ""
  replicaCount: 1
  port: 3000
  path: /
  env:
    APP_NAME: credential-showcase-api
    LOG_LEVEL: debug
    DB_HOST: postgresql
    DB_PORT: "5432"
    DB_NAME: showcase-db
    DB_USERNAME: showcase-user
    CORS_DISABLED: false
    ALLOW_ORIGINS: "*"
    ALLOW_METHODS: "GET, POST, PUT, DELETE, OPTIONS"
    ALLOW_HEADERS: "Content-Type, Authorization"
    ALLOW_CREDENTIALS: "true"
  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi
  podAnnotations: {}
  podSecurityContext: {}
  containerSecurityContext: {}
  service:
    type: ClusterIP
    port: 3000
  networkPolicy:
    enabled: false
    ingress:
      enabled: false
      namespaceSelector: {}
      podSelector: {}

traction_adapter:
  name: credential-showcase-traction-adapter
  image:
    repository: public.ecr.aws/k8o4d9r5/bcshowcase/credential-showcase-traction-adapter
    pullPolicy: IfNotPresent
    pullSecrets: []
    tag: ""
  replicaCount: 1
  port: 3757
  path: /traction
  env:
    APP_NAME: credential-showcase-traction
    LOG_LEVEL: debug
    NODE_PORT: 3757
    RABBITMQ_HOST: rabbitmq
    RABBITMQ_PORT: 5672
    RABBITMQ_USER: guest
    RABBITMQ_VHOST: /
  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi
  podAnnotations: {}
  podSecurityContext: {}
  containerSecurityContext: {}
  service:
    type: ClusterIP
    port: 3757
  networkPolicy:
    enabled: false
    ingress:
      enabled: false
      namespaceSelector: {}
      podSelector: {}

postgresql:
  enabled: true
  architecture: standalone
  auth:
    enablePostgresUser: true
    username: showcase-user
    database: showcase-db
    existingSecret: ""
  primary:
    persistence:
      enabled: true
      size: 1Gi
    resources:
      limits:
        cpu: 200m
        memory: 256Mi
      requests:
        cpu: 100m
        memory: 128Mi
    service:
      ports:
        postgresql: 5432

rabbitmq:
  enabled: true
  auth:
    username: guest
    existingSecret: ""
  persistence:
    enabled: true
    size: 1Gi
  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi
  service:
    type: ClusterIP
    port: 5672
    managerPort: 15672
  containerSecurityContext:
    enabled: false
  podSecurityContext:
    enabled: false
  replicaCount: 1

global:
  namespaceOverride: ""