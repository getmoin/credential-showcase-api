{{- if .Values.rabbitmq.enabled }}
{{- $rabbitmqSecretName := include "credential-showcase.rabbitmq.secret.name" . -}}
{{- $rabbitmqSecret := (lookup "v1" "Secret" .Release.Namespace $rabbitmqSecretName) -}}
{{- if not $rabbitmqSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "credential-showcase.rabbitmq.secret.name" . }}
  namespace: {{ .Values.global.namespaceOverride | default .Release.Namespace }}
  # Remove the keep annotation to allow Helm to manage this resource properly
  # annotations:
  #   "helm.sh/resource-policy": keep
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version }}
type: Opaque
data:
  # Just include the essential keys for the Bitnami chart
  rabbitmq-erlang-cookie: {{ include "getOrGeneratePass" (dict "Namespace" .Release.Namespace "Kind" "Secret" "Name" (include "credential-showcase.rabbitmq.secret.name" .) "Key" "rabbitmq-erlang-cookie" "Length" 32) }}
  rabbitmq-password: {{ include "getOrGeneratePass" (dict "Namespace" .Release.Namespace "Kind" "Secret" "Name" (include "credential-showcase.rabbitmq.secret.name" .) "Key" "rabbitmq-password" "Length" 16) }}
{{- end }}
{{- end }} 