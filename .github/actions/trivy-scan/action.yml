name: 'Trivy Security Scanner'
description: 'Runs Trivy scanner and generates vulnerability summary'

inputs:
  scan-type:
    description: 'Type of scan to perform (fs/image)'
    required: true
  scan-ref:
    description: 'Reference to scan (path or image)'
    required: true
  scan-title:
    description: 'Title for the scan summary'
    required: true

runs:
  using: "composite"
  steps:
    # For filesystem scanning
    - name: Run Trivy FS Scan
      if: inputs.scan-type == 'fs'
      shell: bash
      run: |
        # First scan the root dependencies
        trivy fs \
          --security-checks vuln \
          --format json \
          --output root-scan.json \
          --severity CRITICAL,HIGH,MEDIUM,LOW \
          --debug \
          --package-type npm \
          --dependency-tree \
          .

        # Then scan the specific package
        trivy fs \
          --security-checks vuln \
          --format json \
          --output package-scan.json \
          --severity CRITICAL,HIGH,MEDIUM,LOW \
          --debug \
          --package-type npm \
          --dependency-tree \
          ${{ inputs.scan-ref }}

        # Additional direct scan of package.json files
        echo "Scanning root package.json..."
        trivy fs \
          --security-checks vuln \
          --format json \
          --output root-pkg-scan.json \
          --severity CRITICAL,HIGH,MEDIUM,LOW \
          package.json

        echo "Scanning package package.json..."
        trivy fs \
          --security-checks vuln \
          --format json \
          --output pkg-direct-scan.json \
          --severity CRITICAL,HIGH,MEDIUM,LOW \
          ${{ inputs.scan-ref }}/package.json

    # For image scanning
    - name: Run Trivy Image Scan
      if: inputs.scan-type == 'image'
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'image'
        image-ref: ${{ inputs.scan-ref }}
        format: 'json'
        output: 'scan-results.json'
        severity: 'CRITICAL,HIGH,MEDIUM,LOW'
        exit-code: '0'

    - name: Debug Information
      shell: bash
      run: |
        echo "=== Workspace Structure ==="
        pwd
        ls -la
        echo ""
        echo "=== Root package.json ==="
        cat package.json || echo "No root package.json found"
        echo ""
        echo "=== Package package.json ==="
        cat ${{ inputs.scan-ref }}/package.json || echo "No package package.json found"
        echo ""
        echo "=== Node Modules Structure ==="
        echo "Root node_modules:"
        ls -la node_modules || echo "No root node_modules found"
        echo ""
        echo "Package node_modules:"
        ls -la ${{ inputs.scan-ref }}/node_modules || echo "No package node_modules found"
        echo ""
        echo "=== Scan Results ==="
        if [ "${{ inputs.scan-type }}" = "fs" ]; then
          echo "Root scan results:"
          cat root-scan.json
          echo ""
          echo "Package scan results:"
          cat package-scan.json
        else
          echo "Image scan results:"
          cat scan-results.json
        fi

    - name: Generate Scan Summary
      shell: bash
      run: |
        combine_results() {
          local severity=$1
          local root_count=0
          local pkg_count=0
          
          if [ "${{ inputs.scan-type }}" = "fs" ]; then
            root_count=$(jq "([.Results[]?.Vulnerabilities[]? | select(.Severity==\"$severity\")] | length) // 0" root-scan.json)
            pkg_count=$(jq "([.Results[]?.Vulnerabilities[]? | select(.Severity==\"$severity\")] | length) // 0" package-scan.json)
            echo $((root_count + pkg_count))
          else
            jq "([.Results[]?.Vulnerabilities[]? | select(.Severity==\"$severity\")] | length) // 0" scan-results.json
          fi
        }
        
        CRITICAL_COUNT=$(combine_results "CRITICAL")
        HIGH_COUNT=$(combine_results "HIGH")
        MEDIUM_COUNT=$(combine_results "MEDIUM")
        LOW_COUNT=$(combine_results "LOW")
        UNKNOWN_COUNT=$(combine_results "UNKNOWN")
        
        {
          echo "# ${{ inputs.scan-title }}"
          echo ""
          if [ "$CRITICAL_COUNT" = "0" ] && [ "$HIGH_COUNT" = "0" ] && [ "$MEDIUM_COUNT" = "0" ] && [ "$LOW_COUNT" = "0" ] && [ "$UNKNOWN_COUNT" = "0" ]; then
            echo "No vulnerabilities found"
            echo ""
            echo "Debug Information:"
            echo "\`\`\`"
            echo "Scan Path: ${{ inputs.scan-ref }}"
            echo "Scan Type: ${{ inputs.scan-type }}"
            echo "Workspace Root: $(pwd)"
            echo "\`\`\`"
          else
            echo "| Severity  | Count |"
            echo "|-----------|-------|"
            echo "| Critical  | $CRITICAL_COUNT |"
            echo "| High      | $HIGH_COUNT |"
            echo "| Medium    | $MEDIUM_COUNT |"
            echo "| Low       | $LOW_COUNT |"
            echo "| Unknown   | $UNKNOWN_COUNT |"
          fi
          echo ""
          echo "---"
        } >> $GITHUB_STEP_SUMMARY 