name: CI Template

on:
  push:
    branches:
      - main
      - SHOWCASE-90-pipeline-to-build-and-push
  workflow_call:
    inputs:
      package_name:
        required: true
        type: string
      package_path:
        required: true
        type: string
      docker_image:
        required: true
        type: string
      sonar_project_key:
        required: true
        type: string
    secrets:
      SONAR_TOKEN:
        required: true
      SONAR_HOST_URL:
        required: true
      AWS_ACCESS_KEY_ID:
        required: true
      AWS_SECRET_ACCESS_KEY:
        required: true
      AWS_REGION:
        required: true
      repository_url:
        required: true
      # DOCKERHUB_USERNAME:
      #   required: false
      # DOCKERHUB_TOKEN:
      #   required: false

jobs:
  test:
    name: Test - ${{ inputs.package_name }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9.12.3
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v3
        with:
          # path: ${{ env.STORE_PATH }}
          # key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          # restore-keys: |
          #   ${{ runner.os }}-pnpm-store-
         path: $(pnpm store path)
         key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
         restore-keys: |
           ${{ runner.os }}-pnpm-  

      - name: Install Dependencies
        run: pnpm install

      - name: Run Tests
        run: pnpm test --filter ${{ inputs.package_name }}

  sonar:
    name: SonarQube Analysis - ${{ inputs.package_name }}
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Static Code Analysis with SonarQube
        uses: sonarsource/sonarqube-scan-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          projectBaseDir: .
          args: >
            -Dsonar.projectKey=${{ inputs.sonar_project_key }}
            -Dsonar.sources=${{ inputs.package_path }}/${{ inputs.package_name }}/src

  build:
    name: Build and Push Docker Image - ${{ inputs.package_name }}
    needs: sonar
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon Public ECR
        run: |
          aws ecr-public get-login-password --region us-east-1 | docker login --username AWS --password-stdin public.ecr.aws

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/dev/${{ inputs.package_name }}/Dockerfile
          push: true
          tags: |
            ${{ secrets.repository_url }}/${{ inputs.docker_image }}:latest
            ${{ secrets.repository_url }}/${{ inputs.docker_image }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  image-scan:
    name: Image Scan - ${{ inputs.package_name }}
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Scan Docker Image
        uses: ./.github/actions/trivy-scan
        with:
          scan-type: 'image'
          scan-ref: 'public.ecr.aws/k8o4d9r5/bcshowcase/${{ inputs.docker_image }}:${{ github.sha }}'
          scan-title: 'Docker Image Scan Results for ${{ inputs.package_name }}'
