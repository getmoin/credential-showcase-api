name: CI Template

on:
  workflow_call:
    inputs:
      package_name:
        required: true
        type: string
      package_path:
        required: true
        type: string
      docker_image:
        required: true
        type: string
      # sonar_project_key:
      #   required: true
      #   type: string
    secrets:
      # SONAR_TOKEN:
      #   required: true
      # SONAR_HOST_URL:
      #   required: true
      DOCKERHUB_USERNAME:
        required: false
      DOCKERHUB_TOKEN:
        required: false

jobs:
  test:
    name: Test - ${{ inputs.package_name }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9.12.3
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v3
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install Dependencies
        run: pnpm install

      - name: Run Tests
        run: pnpm test --filter ${{ inputs.package_name }}

  security-scan:
    name: Security Scan - ${{ inputs.package_name }}
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9.12.3
          run_install: false

      - name: Install Dependencies
        run: |
          pnpm install
          # Force install in package directory to ensure node_modules exists
          cd ${{ inputs.package_path }}/${{ inputs.package_name }}
          pnpm install

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin v0.57.1
          trivy --version

      - name: NPM Audit Check
        run: |
          cd ${{ inputs.package_path }}/${{ inputs.package_name }}
          echo "=== PNPM Audit Results ===" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          pnpm audit --json | tee pnpm-audit.json >> $GITHUB_STEP_SUMMARY || true
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

          # Alternative approach using npm
          echo "=== Running NPM Audit ===" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          # Create a package-lock.json by running npm install
          npm install --package-lock-only
          npm audit --json | tee npm-audit.json >> $GITHUB_STEP_SUMMARY || true
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

      - name: Scan Dependencies
        uses: ./.github/actions/trivy-scan
        with:
          scan-type: 'fs'
          scan-ref: '${{ inputs.package_path }}/${{ inputs.package_name }}'
          scan-title: 'Dependency Scan Results for ${{ inputs.package_name }}'

  # sonar:
  #   name: SonarQube Analysis - ${{ inputs.package_name }}
  #   needs: security-scan
  #   runs-on: ubuntu-latest

  #   steps:
  #     - name: Checkout Code
  #       uses: actions/checkout@v4

  #     - name: Run Static Code Analysis with SonarQube
  #       uses: sonarsource/sonarqube-scan-action@v2
  #       env:
  #         SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
  #         SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
  #       with:
  #         projectBaseDir: .
  #         projectKey: ${{ inputs.sonar_project_key }}
  #         args: >
  #           -Dsonar.sources=packages/${{ inputs.package_name }}/src
  #           -Dsonar.tests=packages/${{ inputs.package_name }}/__tests__

  build:
    name: Build and Push Docker Image - ${{ inputs.package_name }}
    needs: security-scan
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/dev/${{ inputs.package_name }}/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ inputs.docker_image }}:latest
            ghcr.io/${{ github.repository_owner }}/${{ inputs.docker_image }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  image-scan:
    name: Image Scan - ${{ inputs.package_name }}
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Scan Docker Image
        uses: ./.github/actions/trivy-scan
        with:
          scan-type: 'image'
          scan-ref: 'ghcr.io/${{ github.repository_owner }}/${{ inputs.docker_image }}:${{ github.sha }}'
          scan-title: 'Docker Image Scan Results for ${{ inputs.package_name }}'
