name: Build, Push and Deploy 
on:
  workflow_dispatch:
  push:
    branches:
      - main
      - develop
    paths:
        - "apps/credential-showcase-api-server/**"
        - "packages/credential-showcase-traction-adapter/**"
        - "docker/dev/**"
        - "charts/**"

jobs:
  build_api_server:
    name: "Build Credential Showcase API Server"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Build API Server Image
        uses: ./.github/actions/build_docker
        id: builder
        with:
          context: "."
          dockerfile: "./docker/dev/credential-showcase-api-server/Dockerfile"
          image_name: ${{ github.repository_owner}}/credential-showcase-api-server
          registry: ghcr.io
          registry_username: ${{ github.repository_owner}}
          registry_password: ${{ secrets.GITHUB_TOKEN }}
    outputs:
      image_tag: ${{ steps.builder.outputs.image_tag }}

  build_traction_adapter:
    name: "Build Credential Showcase Traction Adapter"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Build Traction Adapter Image
        uses: ./.github/actions/build_docker
        id: builder
        with:
          context: "."
          dockerfile: "./docker/dev/credential-showcase-traction-adapter/Dockerfile"
          image_name: ${{ github.repository_owner}}/credential-showcase-traction-adapter
          registry: ghcr.io
          registry_username: ${{ github.repository_owner}}
          registry_password: ${{ secrets.GITHUB_TOKEN }}
    outputs:
      image_tag: ${{ steps.builder.outputs.image_tag }}
  
  deploy:
    name: Deploy
    environment: development
    runs-on: ubuntu-latest
    needs:
      - build_api_server
      - build_traction_adapter
    if: ${{ contains(needs.*.result, 'success') && !(contains(needs.*.result, 'failure')) }}
    steps:
      - uses: actions/checkout@v4

      - name: Install OpenShift CLI tools
        uses: redhat-actions/openshift-tools-installer@v1
        with:
          oc: "4.14"

      - name: Authenticate and set context
        uses: redhat-actions/oc-login@v1
        with:
          openshift_server_url: ${{ secrets.OPENSHIFT_SERVER }}
          openshift_token: ${{ secrets.OPENSHIFT_TOKEN }}
          certificate_authority_data: ${{ secrets.OPENSHIFT_CA_CRT }}
          namespace: ${{ secrets.OPENSHIFT_NAMESPACE }}
     
      - name: Deploy to OpenShift with Helm
        run: |
          cd charts/credential-showcase
          
          # Create environment-specific values
          cat > openshift-values.yaml <<EOF
          openshift:
            enabled: true
            routeSuffix: "${{ secrets.OPENSHIFT_ROUTE_SUFFIX }}"
          
          api_server:
            image:
              repository: ghcr.io/${{ github.repository_owner }}/credential-showcase-api-server
              tag: ${{ needs.build_api_server.outputs.image_tag }}
            openshift:
              route:
                enabled: true
                host: "api-${{ secrets.OPENSHIFT_PROJECT }}-${{ secrets.OPENSHIFT_ROUTE_SUFFIX }}"
          
          traction_adapter:
            image:
              repository: ghcr.io/${{ github.repository_owner }}/credential-showcase-traction-adapter
              tag: ${{ needs.build_traction_adapter.outputs.image_tag }}
            openshift:
              route:
                enabled: true
                host: "traction-${{ secrets.OPENSHIFT_PROJECT }}-${{ secrets.OPENSHIFT_ROUTE_SUFFIX }}"
          EOF
          
          # Deploy with Helm
          helm dependency update
          helm upgrade --install credential-showcase \
            -f ./values.yaml -f ./openshift-values.yaml \
            --set api_server.image.repository=ghcr.io/${{ github.repository_owner }}/credential-showcase-api-server \
            --set api_server.image.tag=${{ needs.build_api_server.outputs.image_tag }} \
            --set traction_adapter.image.repository=ghcr.io/${{ github.repository_owner }}/credential-showcase-traction-adapter \
            --set traction_adapter.image.tag=${{ needs.build_traction_adapter.outputs.image_tag }} \
            . --wait
      
      - name: Restart Deployments
        run: |
          oc rollout restart deployment/credential-showcase-credential-showcase-api-server
          oc rollout restart deployment/credential-showcase-credential-showcase-traction-adapter

  image-scan:
    name: Image Scan
    needs: 
      - build_api_server
      - build_traction_adapter
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Scan API Server Docker Image
        uses: ./.github/actions/trivy-scan
        with:
          scan-type: 'image'
          scan-ref: 'ghcr.io/${{ github.repository_owner }}/credential-showcase-api-server:${{ needs.build_api_server.outputs.image_tag }}'
          scan-title: 'Docker Image Scan Results for credential-showcase-api-server'
      - name: Scan Traction Adapter Docker Image
        uses: ./.github/actions/trivy-scan
        with:
          scan-type: 'image'
          scan-ref: 'ghcr.io/${{ github.repository_owner }}/credential-showcase-traction-adapter:${{ needs.build_traction_adapter.outputs.image_tag }}'
          scan-title: 'Docker Image Scan Results for credential-showcase-traction-adapter'
