name: Build and Deploy

on:
  pull_request:
    branches:
      - main
    paths:
      - "apps/credential-showcase-api-server/**"
      - "packages/credential-showcase-traction-adapter/**"
      - "docker/dev/**"
      - "charts/**"
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

jobs:
  ready:
    name: "Install if ready for review"
    runs-on: ubuntu-latest
    outputs:
      deploy: ${{ steps.ready_for_review.outputs.true_false }}
      build: ${{ steps.ready_for_review.outputs.owner_true_false }}
    steps:
      - id: ready_for_review
        run: |
          echo "true_false=${{ toJSON(github.event.pull_request.draft != true && github.repository_owner == '4sure-tech') }}" >> $GITHUB_OUTPUT #shouuld change to bcgov
          echo "owner_true_false=${{ toJSON(github.repository_owner == '4sure-tech') }}" >> $GITHUB_OUTPUT

  build_api_server:
    name: "Build Credential Showcase API Server"
    runs-on: ubuntu-latest
    if: ${{ always() && fromJSON(needs.ready.outputs.build) == true }}
    needs:
      - ready
    steps:
      - uses: actions/checkout@v4
      - name: Build API Server Image
        uses: ./.github/actions/build_docker
        id: builder
        with:
          context: "."
          dockerfile: "./docker/dev/credential-showcase-api-server/Dockerfile"
          image_name: ${{ github.repository_owner}}/credential-showcase-api-server
          registry: ghcr.io
          registry_username: ${{ github.repository_owner}}
          registry_password: ${{ secrets.GITHUB_TOKEN }}
    outputs:
      image_tag: ${{ steps.builder.outputs.image_tag }}

  build_traction_adapter:
    name: "Build Credential Showcase Traction Adapter"
    runs-on: ubuntu-latest
    if: ${{ always() && fromJSON(needs.ready.outputs.build) == true }}
    needs:
      - ready
    steps:
      - uses: actions/checkout@v4
      - name: Build Traction Adapter Image
        uses: ./.github/actions/build_docker
        id: builder
        with:
          context: "."
          dockerfile: "./docker/dev/credential-showcase-traction-adapter/Dockerfile"
          image_name: ${{ github.repository_owner}}/credential-showcase-traction-adapter
          registry: ghcr.io
          registry_username: ${{ github.repository_owner}}
          registry_password: ${{ secrets.GITHUB_TOKEN }}
    outputs:
      image_tag: ${{ steps.builder.outputs.image_tag }}

  deploy:
    name: Deploy PR
    environment: development
    runs-on: ubuntu-latest
    needs:
      - ready
      - build_api_server
      - build_traction_adapter
    if: ${{ always() && (fromJSON(needs.ready.outputs.deploy) == true) && !(contains(needs.*.result, 'failure')) }}

    steps:
      - uses: actions/checkout@v4

      - name: Install OpenShift CLI tools
        uses: redhat-actions/openshift-tools-installer@v1
        with:
          oc: "4.14"

      - name: Authenticate and set context
        uses: redhat-actions/oc-login@v1
        with:
          openshift_server_url: ${{ secrets.OPENSHIFT_SERVER }}
          openshift_token: ${{ secrets.OPENSHIFT_TOKEN }}
          certificate_authority_data: ${{ secrets.OPENSHIFT_CA_CRT }}
          namespace: ${{ secrets.OPENSHIFT_NAMESPACE }}

      - name: Run Credential Showcase PR Helm
        run: |
          helm upgrade --install pr-${{ github.event.number }}-credential-showcase -f ./charts/credential-showcase/dev-values.yaml \
            --set api_server.image.tag=pr-${{ github.event.number }} \
            --set traction_adapter.image.tag=pr-${{ github.event.number }} \
            ./charts/credential-showcase --wait

      - name: Restart Credential Showcase PR Pods
        run: |
          oc rollout restart deployment/pr-${{ github.event.number }}-credential-showcase-api-server
          oc rollout restart deployment/pr-${{ github.event.number }}-credential-showcase-traction-adapter

  deploymenturls:
    name: Deployment URLs comment
    runs-on: ubuntu-latest
    needs:
      - deploy
    if: ${{ (fromJSON(needs.ready.outputs.deploy) == true) && !(contains(needs.*.result, 'failure')) }}
    steps:
      - uses: actions/checkout@v4

      - name: Find Comment
        uses: peter-evans/find-comment@v3
        id: fc
        with:
          issue-number: ${{ github.event.number }}
          comment-author: "github-actions[bot]"
          body-includes: Deployment URLs ready for review.

      - name: Create comment
        if: steps.fc.outputs.comment-id == ''
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.number }}
          body: |
            | Deployment | Resource | Location |
            | --- | --- | --- |
            | Credential Showcase | | 
            | | API Server | https://pr-${{ github.event.number }}-credential-showcase-api-server-dev.apps.silver.devops.gov.bc.ca/ |
            | | Traction Adapter | https://pr-${{ github.event.number }}-credential-showcase-traction-adapter-dev.apps.silver.devops.gov.bc.ca/ |

            Deployment URLs ready for review.