name: PR Build and Deploy

on:
  pull_request:
    branches:
      - main
      - develop
    paths:
      - "apps/credential-showcase-api-server/**"
      - "packages/credential-showcase-traction-adapter/**"
      - "docker/dev/**"
      - "charts/**"
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

jobs:
  ready:
    name: "Check if PR is ready for review"
    runs-on: ubuntu-latest
    outputs:
      deploy: ${{ steps.ready_for_review.outputs.true_false }}
      build: ${{ steps.ready_for_review.outputs.owner_true_false }}
    steps:
      - id: ready_for_review
        run: |
          echo "true_false=${{ toJSON(github.event.pull_request.draft != true && github.repository_owner == 'getmoin') }}" >> $GITHUB_OUTPUT #shouuld change to bcgov
          echo "owner_true_false=${{ toJSON(github.repository_owner == 'getmoin') }}" >> $GITHUB_OUTPUT
          
  build_api_server:
    name: "Build Credential Showcase API Server"
    runs-on: ubuntu-latest
    needs:
      - ready
    if: ${{ always() && fromJSON(needs.ready.outputs.deploy) == true }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon Public ECR
        run: |
          aws ecr-public get-login-password --region us-east-1 | docker login --username AWS --password-stdin public.ecr.aws/${{ secrets.ECR_REGISTRY }}

      - name: Build and Push Docker Image
        id: builder
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/dev/credential-showcase-api-server/Dockerfile
          push: true
          tags: |
            public.ecr.aws/k8o4d9r5/bcshowcase/credential-showcase-api-server:latest
            public.ecr.aws/k8o4d9r5/bcshowcase/credential-showcase-api-server:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
    outputs:
      image_tag: ${{ github.sha }}

  build_traction_adapter:
    name: "Build Credential Showcase Traction Adapter"
    runs-on: ubuntu-latest
    needs:
      - ready
    if: ${{ always() && fromJSON(needs.ready.outputs.deploy) == true }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon Public ECR
        run: |
          aws ecr-public get-login-password --region us-east-1 | docker login --username AWS --password-stdin public.ecr.aws/${{ secrets.ECR_REGISTRY }}

      - name: Build and Push Docker Image
        id: builder
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/dev/credential-showcase-traction-adapter/Dockerfile
          push: true
          tags: |
            public.ecr.aws/k8o4d9r5/bcshowcase/credential-showcase-traction-adapter:latest
            public.ecr.aws/k8o4d9r5/bcshowcase/credential-showcase-traction-adapter:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
    outputs:
      image_tag: ${{ github.sha }}

  image-scan:
    name: "Image Scan"
    needs: [build_api_server, build_traction_adapter, ready]
    runs-on: ubuntu-latest
    if: ${{ always() && fromJSON(needs.ready.outputs.deploy) == true && !(contains(needs.*.result, 'failure')) }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Scan API Server Docker Image
        uses: ./.github/actions/trivy-scan
        with:
          scan-type: 'image'
          scan-ref: 'public.ecr.aws/k8o4d9r5/bcshowcase/credential-showcase-api-server:${{ github.sha }}'
          scan-title: 'Docker Image Scan Results for credential-showcase-api-server'
      - name: Scan Traction Adapter Docker Image
        uses: ./.github/actions/trivy-scan
        with:
          scan-type: 'image'
          scan-ref: 'public.ecr.aws/k8o4d9r5/bcshowcase/credential-showcase-traction-adapter:${{ github.sha }}'
          scan-title: 'Docker Image Scan Results for credential-showcase-traction-adapter'
  
  deploy:
    name: "Deploy PR Environment"
    environment: development
    runs-on: ubuntu-latest
    needs:
      - ready
      - build_api_server
      - build_traction_adapter
    if: ${{ always() && fromJSON(needs.ready.outputs.deploy) == true && !(contains(needs.*.result, 'failure')) }}
    steps:
      - uses: actions/checkout@v4
      
      # Copy charts to EC2 server first
      - name: Copy charts to EC2
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "charts/"
          target: "/home/ubuntu/pipeline"
          overwrite: true
          strip_components: 0

      # Deploy using SSH to EC2 instance
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /home/ubuntu/pipeline/charts/credential-showcase

            cat > pr-values.yaml <<EOF
            # API Server configuration
            api_server:
              ingress:
                enabled: true
                annotations:
                  kubernetes.io/ingress.class: "traefik"
                  traefik.ingress.kubernetes.io/router.entrypoints: "websecure"
                  traefik.ingress.kubernetes.io/router.tls: "true"
                host: "pr-${{ github.event.number }}-api.dev.nborbit.ca"
            
            # Traction Adapter configuration  
            traction_adapter:
              ingress:
                enabled: true
                annotations:
                  kubernetes.io/ingress.class: "traefik"
                  traefik.ingress.kubernetes.io/router.entrypoints: "websecure"
                  traefik.ingress.kubernetes.io/router.tls: "true"
                host: "pr-${{ github.event.number }}-traction.dev.nborbit.ca"
            
            # Global ingress settings
            ingress:
              enabled: true
              className: "traefik"
              annotations:
                kubernetes.io/ingress.class: "traefik"
                traefik.ingress.kubernetes.io/router.entrypoints: "websecure"
                cert-manager.io/cluster-issuer: "letsencrypt-prod"
              hosts:
                - host: pr-${{ github.event.number }}-api.dev.nborbit.ca
                  paths:
                    - path: /
                      pathType: Prefix
                      service: api-server
                - host: pr-${{ github.event.number }}-traction.dev.nborbit.ca
                  paths:
                    - path: /
                      pathType: Prefix
                      service: traction-adapter
              tls:
                - secretName: pr-${{ github.event.number }}-showcase-tls
                  hosts:
                    - pr-${{ github.event.number }}-api.dev.nborbit.ca
                    - pr-${{ github.event.number }}-traction.dev.nborbit.ca
  
            EOF

            # Create PR-specific Certificate
            cat <<EOF | sudo kubectl apply -f -
            apiVersion: cert-manager.io/v1
            kind: Certificate
            metadata:
              name: pr-${{ github.event.number }}-showcase-tls
            spec:
              secretName: pr-${{ github.event.number }}-showcase-tls
              issuerRef:
                name: letsencrypt-prod
                kind: ClusterIssuer
              dnsNames:
                - pr-${{ github.event.number }}-api.dev.nborbit.ca
                - pr-${{ github.event.number }}-traction.dev.nborbit.ca
            EOF

            helm dependency update && helm upgrade --install pr-${{ github.event.number }}-credential-showcase -f ./pr-values.yaml --set api_server.image.tag=${{ github.sha }} --set traction_adapter.image.tag=${{ github.sha }} . --wait

            
            # # Create PR-specific API Server IngressRoute
            # cat <<EOF | sudo kubectl apply -f -
            # apiVersion: traefik.containo.us/v1alpha1
            # kind: IngressRoute
            # metadata:
            #   name: pr-${{ github.event.number }}-api-server-route
            #   namespace: kube-system
            # spec:
            #   entryPoints:
            #     - websecure
            #   routes:
            #     - match: Host(\`pr-${{ github.event.number }}-api.dev.nborbit.ca\`)
            #       kind: Rule
            #       services:
            #         - name: pr-${{ github.event.number }}-credential-showcase-credential-showcase-api-server
            #           port: 3000
            #   tls:
            #     secretName: pr-${{ github.event.number }}-showcase-tls
            # EOF

            # # Create PR-specific Traction Adapter IngressRoute
            # cat <<EOF | sudo kubectl apply -f -
            # apiVersion: traefik.containo.us/v1alpha1
            # kind: IngressRoute
            # metadata:
            #   name: pr-${{ github.event.number }}-traction-adapter-route
            #   namespace: kube-system
            # spec:
            #   entryPoints:
            #     - websecure
            #   routes:
            #     - match: Host(\`pr-${{ github.event.number }}-traction.dev.nborbit.ca\`)
            #       kind: Rule
            #       services:
            #         - name: pr-${{ github.event.number }}-credential-showcase-credential-showcase-traction-adapter
            #           port: 3757
            #   tls:
            #     secretName: pr-${{ github.event.number }}-showcase-tls
            # EOF

            rm -rf /home/ubuntu/pipeline/charts
      
      - name: Restart PR Deployments
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            sudo kubectl rollout restart deployment pr-${{ github.event.number }}-credential-showcase-credential-showcase-api-server
            sudo kubectl rollout restart deployment pr-${{ github.event.number }}-credential-showcase-credential-showcase-traction-adapter


  deploymenturls:
    name: PR Deployment URLs comment
    runs-on: ubuntu-latest
    needs:
      - deploy
    if: ${{ always() && fromJSON(needs.ready.outputs.deploy) == true && !(contains(needs.*.result, 'failure')) }}
    steps:
      - uses: actions/checkout@v4

      - name: Find Comment
        uses: peter-evans/find-comment@v3
        id: fc
        with:
          issue-number: ${{ github.event.number }}
          comment-author: "github-actions[bot]"
          body-includes: PR Deployment URLs ready for review.

      - name: Create comment
        if: steps.fc.outputs.comment-id == ''
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.number }}
          body: |
            | Deployment | Resource | Location |
            | --- | --- | --- |
            | API Server | | https://pr-${{ github.event.number }}-api.dev.nborbit.ca/ |
            | Traction Adapter | | https://pr-${{ github.event.number }}-traction.dev.nborbit.ca/ |

            PR Deployment URLs ready for review.
